apiVersion: v1
kind: CoderWorkspace
spec:
    deployments:
        - shortName: 'deepl-rb-dev'
          gitRepositoryHttpUrl: 'https://git.deepl.dev/deepl/backend/oss-client-libs/deepl-ruby.git'
          containerImage: 'harbor.deepl.dev/olympus/devcontainers/base-ubuntu'
          shellSessionStartingDir: '/workspaces/deepl-rb'
          resources:
              requests:
                  cpu: '2'
                  memory: 4Gi
              limits:
                  memory: 16Gi
          volumeMounts:
              - name: 'workspaces'
                size: '10'
                mountPath: '/workspaces'
              - name: 'home--vscode'
                size: '10'
                mountPath: '/home/vscode'
